<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roblox Unowned Group Scanner</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:#111827;
      border-radius:18px;
      padding:25px;
      box-shadow:0 0 25px rgba(0,0,0,.4);
    }

    h1{
      margin-top:0;
      text-align:center;
      color:#38bdf8;
    }

    .controls{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-bottom:20px;
    }

    input,button{
      padding:12px;
      border:none;
      border-radius:12px;
      font-size:15px;
    }

    input{
      background:#1e293b;
      color:white;
    }

    button{
      background:#0ea5e9;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#0284c7;
    }

    .stop{
      background:#ef4444;
    }

    .stop:hover{
      background:#dc2626;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:12px;
      margin-bottom:20px;
    }

    .card{
      background:#1e293b;
      padding:16px;
      border-radius:14px;
      text-align:center;
    }

    .card h2{
      margin:8px 0 0;
      color:#38bdf8;
      font-size:28px;
    }

    .log{
      background:#020617;
      border:1px solid #334155;
      border-radius:14px;
      padding:15px;
      height:500px;
      overflow-y:auto;
      font-family:monospace;
      font-size:14px;
    }

    .found{
      color:#22c55e;
      margin-bottom:8px;
    }

    .taken{
      color:#f87171;
      margin-bottom:8px;
    }

    .deleted{
      color:#facc15;
      margin-bottom:8px;
    }

    .info{
      color:#94a3b8;
      margin-bottom:8px;
    }

    a{
      color:#38bdf8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Roblox Unowned Group Scanner</h1>

  <div class="controls">
    <input type="number" id="startId" value="1" placeholder="Start ID">
    <input type="number" id="delay" value="250" placeholder="Delay ms">

    <button onclick="startScanner()">
      Start
    </button>

    <button class="stop" onclick="stopScanner()">
      Stop
    </button>
  </div>

  <div class="stats">
    <div class="card">
      Checked
      <h2 id="checked">0</h2>
    </div>

    <div class="card">
      Unowned
      <h2 id="unowned">0</h2>
    </div>

    <div class="card">
      Current ID
      <h2 id="current">0</h2>
    </div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
const API = "https://groupapi.infodmca.com/api/check?id=";

let running = false;
let checked = 0;
let unowned = 0;

function addLog(text, cls="info"){
  const log = document.getElementById("log");

  const div = document.createElement("div");
  div.className = cls;
  div.innerHTML = text;

  log.prepend(div);
}

function updateStats(id){
  document.getElementById("checked").textContent = checked;
  document.getElementById("unowned").textContent = unowned;
  document.getElementById("current").textContent = id;
}

async function checkGroup(id){

  try{

    const res = await fetch(API + id);
    const data = await res.json();

    if(data.unowned){

      unowned++;

      addLog(
        `✅ UNOWNED → 
        <a href="https://www.roblox.com/groups/${id}" target="_blank">
          ${data.name}
        </a> 
        (#${id})`,
        "found"
      );

    } else if(data.exists){

      addLog(
        `❌ TAKEN → ${data.name} (#${id})`,
        "taken"
      );

    } else {

      addLog(
        `⚠ DELETED / INVALID (#${id})`,
        "deleted"
      );

    }

  } catch(err){

    addLog(
      `⚠ ERROR ${id}: ${err.message}`,
      "deleted"
    );

  }

}

async function startScanner(){

  if(running) return;

  running = true;

  let id = parseInt(
    document.getElementById("startId").value
  ) || 1;

  const delay = parseInt(
    document.getElementById("delay").value
  ) || 250;

  addLog("🚀 Scanner started");

  while(running){

    checked++;

    updateStats(id);

    await checkGroup(id);

    id++;

    await new Promise(resolve =>
      setTimeout(resolve, delay)
    );

  }

}

function stopScanner(){

  running = false;

  addLog("🛑 Scanner stopped");

}
</script>

</body>
</html>
