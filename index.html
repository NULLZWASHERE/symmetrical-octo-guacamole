<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Group Scanner</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body {
  margin: 0;
  padding: 0;
  background: #0f0f13;
  color: #e0e0e0;
  font-family: 'Inter', system-ui, sans-serif;
}

.container { max-width: 1100px; margin: auto; padding: 20px; }

h1 { color: #00ff9d; text-align: center; }

.controls, .stats {
  background: #1a1a22;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input {
  background: #25252e;
  border: 1px solid #444;
  color: white;
  padding: 8px;
  border-radius: 6px;
  width: 150px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn-start { background: #00ff9d; }
.btn-stop { background: #ff3b5c; color: white; }

#log {
  background: #0a0a0d;
  height: 450px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  font-family: monospace;
}

.found { color: #00ff9d; }
.deleted { color: #ff3b5c; }
</style>
</head>

<body>

<div class="container">

<h1>Group Scanner</h1>

<div class="controls">
  <input type="number" id="startId" value="1">
  <input type="number" id="threads" value="50">

  <button class="btn-start" onclick="startScanner()">Start</button>
  <button class="btn-stop" onclick="stopScanner()">Stop</button>
</div>

<div class="stats">
  Checked: <span id="checked">0</span> |
  Found: <span id="found">0</span> |
  Speed: <span id="speed">0</span>/s
</div>

<div id="log"></div>

</div>

<script>
const API = "https://groupapi.infodmca.com/api/check?id=";

let running = false;
let currentId = 1;
let checked = 0;
let found = 0;
let cps = 0;

let foundList = [];

function log(msg, cls="") {
  const div = document.createElement("div");
  div.className = cls;
  div.innerHTML = msg;
  document.getElementById("log").prepend(div);
}

function update() {
  document.getElementById("checked").textContent = checked;
  document.getElementById("found").textContent = found;
}

setInterval(() => {
  document.getElementById("speed").textContent = cps;
  cps = 0;
}, 1000);

// 💾 SAVE FOUND GROUPS TO FILE
function saveToFile(group) {
  foundList.push(group);

  const csv = [
    "GroupID,Name,URL",
    ...foundList.map(g =>
      `${g.id},"${g.name.replace(/"/g,'""')}","${g.url}"`
    )
  ].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "found_groups.csv";
  a.click();

  URL.revokeObjectURL(url);
}

async function check(id) {
  try {
    const r = await fetch(API + id);
    const data = await r.json();

    checked++;
    cps++;

    if (!data.success) return;

    if (data.exists && data.unowned && !data.locked) {

      found++;

      const group = {
        id,
        name: data.name || "Unnamed",
        url: `https://www.roblox.com/groups/${id}`
      };

      log(`✅ FOUND: <a href="${group.url}" target="_blank">${group.name}</a> (#${id})`, "found");

      saveToFile(group);
    }

  } catch (e) {}
  update();
}

async function worker() {
  while (running) {
    const tasks = [];
    for (let i = 0; i < 60; i++) {
      const id = currentId++;
      tasks.push(check(id));
    }
    await Promise.allSettled(tasks);
  }
}

function startScanner() {
  if (running) return;

  running = true;
  const start = parseInt(document.getElementById("startId").value);
  currentId = start || 1;

  const threads = parseInt(document.getElementById("threads").value) || 50;

  for (let i = 0; i < threads; i++) {
    worker();
  }

  log("Started scanner", "found");
}

function stopScanner() {
  running = false;
  log("Stopped", "deleted");
}
</script>

</body>
</html>
