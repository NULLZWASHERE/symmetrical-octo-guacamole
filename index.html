<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Group Scanner</title>

<style>
body { background:#0f0f13; color:#e0e0e0; font-family:Arial; }
.container { max-width:900px; margin:auto; padding:20px; }
h1 { color:#00ff9d; text-align:center; }

.controls { display:flex; gap:10px; margin-bottom:10px; }

input {
  background:#222;
  color:white;
  border:1px solid #444;
  padding:8px;
  border-radius:6px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.start { background:#00ff9d; }
.stop { background:#ff3b5c; color:white; }

#log {
  height:450px;
  overflow:auto;
  background:#0a0a0d;
  border:1px solid #333;
  padding:10px;
  font-family:monospace;
}

.found { color:#00ff9d; }
</style>
</head>

<body>

<div class="container">
<h1>Group Scanner</h1>

<div class="controls">
  <input type="number" id="startId" value="1">
  <input type="number" id="rate" value="10">
  <button class="start" onclick="start()">Start</button>
  <button class="stop" onclick="stop()">Stop</button>
</div>

<div>
Checked: <span id="checked">0</span> |
Found: <span id="found">0</span> |
Speed: <span id="speed">0</span>/s
</div>

<div id="log"></div>
</div>

<script>
const API = "https://groupapi.infodmca.com/api/check?id=";

let running = false;
let id = 1;
let checked = 0;
let found = 0;
let cps = 0;

let foundList = [];

// ⚡ simple queue system (prevents lag)
let queue = [];
let active = 0;
let maxConcurrent = 5;

function log(msg) {
  const div = document.createElement("div");
  div.innerHTML = msg;
  document.getElementById("log").prepend(div);
}

function update() {
  document.getElementById("checked").textContent = checked;
  document.getElementById("found").textContent = found;
}

// speed counter
setInterval(() => {
  document.getElementById("speed").textContent = cps;
  cps = 0;
}, 1000);

async function worker() {
  while (running) {

    if (active >= maxConcurrent) {
      await new Promise(r => setTimeout(r, 20));
      continue;
    }

    const gid = id++;
    active++;

    fetch(API + gid)
      .then(r => r.json())
      .then(data => {
        checked++;
        cps++;

        // 🔥 STRICT FILTER (fixes locked false positives)
        if (
          data.exists === true &&
          data.unowned === true &&
          data.locked === false
        ) {
          found++;

          const g = {
            id: gid,
            name: data.name || "Unnamed",
            url: `https://www.roblox.com/groups/${gid}`
          };

          foundList.push(g);

          log(`✅ <a class="found" href="${g.url}" target="_blank">${g.name}</a> (#${gid})`);
        }

      })
      .catch(() => {})
      .finally(() => {
        active--;
        update();
      });

    // ⚡ controlled speed
    await new Promise(r => setTimeout(r, 10));
  }
}

function start() {
  if (running) return;

  running = true;
  id = parseInt(document.getElementById("startId").value) || 1;

  const rate = parseInt(document.getElementById("rate").value) || 5;
  maxConcurrent = rate;

  log("Started scanner");
  for (let i = 0; i < 3; i++) worker();
}

function stop() {
  running = false;
  log("Stopped");
}
</script>

</body>
</html>
