<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Group Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background: #0f0f13;
      color: #e0e0e0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      color: #00ff9d;
      margin: 0;
      font-size: 2.5rem;
      text-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
    }

    .subtitle {
      color: #888;
      margin-top: 8px;
    }

    .controls {
      background: #1a1a22;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: end;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.9rem;
      color: #aaa;
    }

    input {
      background: #25252e;
      border: 1px solid #444;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 1rem;
      width: 180px;
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #00ff9d;
      color: black;
    }

    .btn-start:hover {
      background: #00cc7a;
      transform: translateY(-2px);
    }

    .btn-stop {
      background: #ff3b5c;
      color: white;
    }

    .btn-stop:hover {
      background: #e02e4d;
      transform: translateY(-2px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #1a1a22;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #333;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #00ff9d;
    }

    .stat-label {
      color: #888;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    #log {
      background: #0a0a0d;
      border: 1px solid #333;
      border-radius: 12px;
      height: 500px;
      overflow-y: auto;
      padding: 15px;
      font-family: monospace;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .log-entry {
      margin-bottom: 6px;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .info {
      color: #aaa;
    }

    .found {
      background: rgba(0, 255, 157, 0.1);
      color: #00ff9d;
      border-left: 4px solid #00ff9d;
    }

    .deleted {
      color: #ff3b5c;
    }

    a {
      color: #00ccff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Group Scanner</h1>
      <p class="subtitle">Ultra-fast Roblox group unowned finder</p>
    </header>

    <div class="controls">
      <div class="input-group">
        <label for="startId">Starting Group ID</label>
        <input type="number" id="startId" value="1" placeholder="1">
      </div>

      <div class="input-group">
        <label for="threads">Threads</label>
        <input type="number" id="threads" value="50" placeholder="50">
      </div>

      <div>
        <button onclick="startScanner()" class="btn-start">▶ Start Scanner</button>
        <button onclick="stopScanner()" class="btn-stop" style="margin-left: 10px;">⏹ Stop</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="checked">0</div>
        <div class="stat-label">Checked</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="unowned">0</div>
        <div class="stat-label">Unowned Found</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="current">1</div>
        <div class="stat-label">Current ID</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="speed">0/s</div>
        <div class="stat-label">Speed</div>
      </div>
    </div>

    <h2 style="margin: 15px 0 10px 5px; color: #ccc;">Live Log</h2>
    <div id="log"></div>

    <div class="footer">
      Made with ❤️ • For educational purposes
    </div>
  </div>

  <script>
    const API = "https://groupapi.infodmca.com/api/check?id=";
    let running = false;
    let checked = 0;
    let unowned = 0;
    let currentId = 1;
    let cps = 0;

    function log(text, cls="info") {
      const el = document.createElement("div");
      el.className = `log-entry ${cls}`;
      el.innerHTML = text;
      const logs = document.getElementById("log");
      logs.prepend(el);
      
      while (logs.children.length > 300) {
        logs.removeChild(logs.lastChild);
      }
    }

    function update() {
      document.getElementById("checked").textContent = checked.toLocaleString();
      document.getElementById("unowned").textContent = unowned.toLocaleString();
      document.getElementById("current").textContent = currentId.toLocaleString();
    }

    setInterval(() => {
      document.getElementById("speed").textContent = cps + "/s";
      cps = 0;
    }, 1000);

    async function check(id) {
      try {
        const r = await fetch(API + id);
        const data = await r.json();
        
        checked++;
        cps++;
        
        if (data.unowned) {
          unowned++;
          log(
            `✅ UNOWNED → 
            <a href="https://www.roblox.com/groups/${id}" target="_blank">
              ${data.name || 'Unnamed Group'}
            </a> 
            (#${id})`,
            "found"
          );
        }
        update();
      } catch (e) {
        // Silently ignore errors for maximum speed
      }
    }

    async function thread() {
      while (running) {
        const batch = [];
        for (let i = 0; i < 100; i++) {
          const id = currentId++;
          batch.push(check(id));
        }
        await Promise.allSettled(batch);
      }
    }

    function startScanner() {
      if (running) return;
      
      running = true;
      checked = 0;
      unowned = 0;
      
      const startInput = parseInt(document.getElementById("startId").value);
      currentId = isNaN(startInput) ? 1 : startInput;
      
      const threadCount = parseInt(document.getElementById("threads").value) || 50;
      
      log(`🚀 Started <strong>${threadCount}</strong> ultra-fast threads`, "info");
      
      for (let i = 0; i < threadCount; i++) {
        thread();
      }
    }

    function stopScanner() {
      running = false;
      log("🛑 Scanner stopped", "deleted");
    }

    // Allow pressing Enter to start
    document.addEventListener("keypress", (e) => {
      if (e.key === "Enter" && !running) {
        startScanner();
      }
    });

    // Welcome message
    window.onload = () => {
      log("👋 Roblox Group Scanner ready. Press <strong>Start Scanner</strong> to begin.", "info");
    };
  </script>
</body>
</html>
